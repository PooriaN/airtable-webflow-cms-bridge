<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Bridge Login</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --error: #ef4444;
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 32%),
        linear-gradient(180deg, #0a0a0f 0%, #11111a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(420px, 100%);
      padding: 28px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(19, 19, 26, 0.96);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      letter-spacing: -0.6px;
    }

    h1 span { color: var(--accent); }

    p {
      margin: 0 0 22px;
      color: var(--text-dim);
      line-height: 1.5;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 12px 14px;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .error {
      display: none;
      margin-top: 14px;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 13px;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .setup-link {
      display: none;
      margin-top: 14px;
      text-align: center;
    }

    .setup-link a {
      color: #c7d2fe;
      font-size: 13px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1><span>CMS</span> Bridge</h1>
    <p>Enter the shared password to access the dashboard and sync APIs.</p>

    <form id="login-form">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit" id="submit-btn">Sign in</button>
      <div class="error" id="error-box"></div>
    </form>

    <div class="hint">Your session stays active for 7 days unless you sign out.</div>
    <div class="setup-link" id="setup-link">
      <a href="/setup">Open setup</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const errorBox = document.getElementById('error-box');
    const setupLink = document.getElementById('setup-link');

    function getNextPath() {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next') || '/';
      return next.startsWith('/') ? next : '/';
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.style.display = 'none';
      errorBox.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: passwordInput.value }),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (res.status === 503) {
            setupLink.style.display = 'block';
          }
          throw new Error(res.status === 401 ? 'Invalid credentials' : (data.error || 'Authentication failed'));
        }

        window.location.href = getNextPath();
      } catch (error) {
        errorBox.textContent = error.message || 'Authentication failed';
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in';
      }
    });

    fetch('/api/setup/status')
      .then(res => res.ok ? res.json() : null)
      .then(data => {
        if (!data?.status) return;
        if (!data.status.authConfigured) {
          setupLink.style.display = 'block';
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
